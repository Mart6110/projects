<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Todo</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 560px;
      margin: 40px auto;
      padding: 0 16px;
      background: #fafafa;
      color: #222;
    }
    h1 { font-size: 1.5rem; }
    form.add-form {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }
    form.add-form input[type=text] {
      flex: 1;
      padding: 10px 12px;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    form.add-form button {
      padding: 10px 16px;
      font-size: 1rem;
      border: none;
      border-radius: 6px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }
    ul.tasks { list-style: none; padding: 0; margin: 0; }
    li.task {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: white;
      border: 1px solid #e5e5e5;
      border-radius: 6px;
      margin-bottom: 8px;
    }
    li.task.done .title {
      text-decoration: line-through;
      color: #999;
    }
    li.task .title { flex: 1; }
    li.task button {
      border: none;
      background: none;
      cursor: pointer;
      font-size: 1rem;
      padding: 4px 8px;
    }
    li.task button.delete { color: #dc2626; }
    .empty { color: #888; font-style: italic; }
  </style>
</head>
<body>
  <h1>Todo</h1>

  <form class="add-form" action="{{ url_for('add') }}" method="post">
    <input type="text" name="title" placeholder="What needs doing?" autofocus required>
    <button type="submit">Add</button>
  </form>

  {% if tasks %}
  <ul class="tasks">
    {% for task in tasks %}
    <li class="task {{ 'done' if task.done else '' }}">
      <form action="{{ url_for('complete', task_id=task.id) }}" method="post">
        <button type="submit" title="Toggle done">{{ '☑' if task.done else '☐' }}</button>
      </form>
      <span class="title">{{ task.title }}</span>
      <form action="{{ url_for('delete', task_id=task.id) }}" method="post">
        <button type="submit" class="delete" title="Delete">✕</button>
      </form>
    </li>
    {% endfor %}
  </ul>
  {% else %}
  <p class="empty">No tasks yet — add one above.</p>
  {% endif %}
</body>
</html>
