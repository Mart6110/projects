services:
  mongo:
    build: ./database
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: sports_app
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DATABASE: sports_app
      PORT: "8080"
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mongo-data:
